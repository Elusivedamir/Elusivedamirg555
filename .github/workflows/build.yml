name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ВАЖНО: Исправление окончаний строк для всех .command файлов
      - name: Fix line endings (CRLF to LF)
        run: |
          brew install dos2unix
          find . -name "*.command" -exec dos2unix {} \;

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Install system dependencies
        run: |
          brew update
          brew install qt@6
          echo "/opt/homebrew/opt/qt@6/bin" >> "$GITHUB_PATH"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --upgrade PyQt6 PyQt6-Qt6 PyQt6-sip qasync telethon keyring cryptg pysocks pyinstaller
          python -m pip install -r requirements.txt

      - name: Check for dependency conflicts
        run: |
          python -m pip check

      - name: Syntax check
        run: |
          python -m py_compile main.py config.py utils.py telegram_bot.py gui.py gui_styles.py gui_auth.py gui_channels.py gui_pairs.py gui_commenting.py

      - name: Run smoke tests
        run: |
          python test_smoke.py

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --clean --noconfirm build.spec

      - name: Verify build
        run: |
          echo "📁 Проверка .app:"
          ls -la dist/TelegramAutoBot.app/Contents/ || true
          echo ""
          echo "📁 Проверка MacOS:"
          ls -la dist/TelegramAutoBot.app/Contents/MacOS/ || true

      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          cp -R dist/TelegramAutoBot.app dist/dmg/
          # Использование hdiutil для создания образа
          hdiutil create -volname "TelegramAutoBot" -srcfolder dist/dmg -ov -format UDZO dist/TelegramAutoBot.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TelegramAutoBot-Build
          path: dist/TelegramAutoBot.dmg
