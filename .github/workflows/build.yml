name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          brew update
          brew install qt@6 gettext
          # Добавляем пути к qt@6 в PATH для сборки
          echo "/opt/homebrew/opt/qt@6/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/opt/gettext/bin" >> "$GITHUB_PATH"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'arm64'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --clean --noconfirm build.spec

      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          cp -R dist/TelegramAutoBot.app dist/dmg/
          hdiutil create -volname "TelegramAutoBot" -srcfolder dist/dmg -ov -format UDZO dist/TelegramAutoBot.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TelegramAutoBot-macOS
          path: dist/TelegramAutoBot.dmg
