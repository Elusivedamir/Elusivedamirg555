name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Install system dependencies
        run: |
          brew update
          brew install qt@6 gettext
          # Добавляем пути в окружение для корректной линковки библиотек
          echo "LDFLAGS=-L$(brew --prefix gettext)/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I$(brew --prefix gettext)/include" >> $GITHUB_ENV
          echo "/opt/homebrew/opt/qt@6/bin" >> "$GITHUB_PATH"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --upgrade PyQt6 PyQt6-Qt6 PyQt6-sip qasync telethon keyring cryptg pysocks pyinstaller
          python -m pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --clean --noconfirm build.spec

      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          # Копируем приложение в папку для DMG
          cp -R dist/TelegramAutoBot.app dist/dmg/
          # Создаем DMG
          hdiutil create -volname "TelegramAutoBot" -srcfolder dist/dmg -ov -format UDZO dist/TelegramAutoBot.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TelegramAutoBot-Installer
          path: dist/TelegramAutoBot.dmg
          if-no-files-found: error
