name: Build macOS App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # ЭТОТ ШАГ КРИТИЧЕСКИ ВАЖЕН ДЛЯ ИСПРАВЛЕНИЯ DYLD ERROR
      - name: Install system dependencies
        run: |
          brew update
          brew install gettext qt@6

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build App with PyInstaller
        run: |
          # Убедитесь, что build.spec настроен верно
          pyinstaller --clean --noconfirm build.spec

      - name: Create DMG
        run: |
          chmod +x ./build_dmg.command
          ./build_dmg.command

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TelegramAutoBot-macOS
          path: dist/*.dmg
          retention-days: 7
